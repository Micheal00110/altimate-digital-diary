<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Child E-Diary</title>
  </head>
  <body>
    <div id="root">
      <div style="padding: 40px; text-align: center; font-family: sans-serif;">
        <p>Loading My Child Diary...</p>
      </div>
    </div>
    <div id="error-display" style="display: none; padding: 20px; color: red; font-family: monospace; white-space: pre-wrap;"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('error-display');
        el.style.display = 'block';
        el.textContent = 'JS ERROR: ' + msg + ' at ' + url + ':' + line + ':' + col;
        console.error('Global error:', msg, url, line, col, error);
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
